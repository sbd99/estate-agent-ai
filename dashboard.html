<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Estate Agency — Live Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #0d1b2a;
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    header .logo {
      width: 40px; height: 40px;
      background: #1a6fc4;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    header p {
      font-size: .8rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    /* ── Stat cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    @media (max-width: 640px) { .cards { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-top: 4px solid #1a6fc4;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); }
    .card:nth-child(2) { border-top-color: #16a34a; }
    .card:nth-child(3) { border-top-color: #d97706; }

    .card .label {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      margin-bottom: 10px;
    }
    .card .value {
      font-size: 2.6rem;
      font-weight: 700;
      color: #0d1b2a;
      line-height: 1;
    }

    /* ── Recent enquiries table ── */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #0d1b2a;
      margin-bottom: 14px;
    }

    .table-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }
    thead {
      background: #0d1b2a;
      color: #94a3b8;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    thead th {
      padding: 13px 18px;
      text-align: left;
      font-weight: 600;
    }
    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    tbody td {
      padding: 13px 18px;
      color: #334155;
      vertical-align: middle;
    }
    tbody td.dim { color: #94a3b8; font-size: .8rem; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .badge-replied  { background: #dcfce7; color: #15803d; }
    .badge-failed   { background: #fee2e2; color: #b91c1c; }

    .empty-row td {
      text-align: center;
      color: #94a3b8;
      padding: 40px;
      font-style: italic;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: .78rem;
      color: #94a3b8;
      padding: 28px 16px 40px;
    }
    #last-updated { font-weight: 600; color: #64748b; }

    /* ── Simulate booking button ── */
    .booking-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 18px;
      background: #d97706;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .booking-btn:hover  { background: #b45309; }
    .booking-btn:active { transform: scale(.97); }
    .booking-btn:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="logo">B</div>
  <div>
    <h1>Your Estate Agency</h1>
    <p>Live Automation Dashboard</p>
  </div>
</header>

<main>
  <div class="cards">
    <div class="card">
      <div class="label">Enquiries Received</div>
      <div class="value" id="total-enquiries">—</div>
    </div>
    <div class="card">
      <div class="label">Replies Sent</div>
      <div class="value" id="replies-sent">—</div>
    </div>
    <div class="card">
      <div class="label">Bookings</div>
      <div class="value" id="bookings">—</div>
      <button class="booking-btn" id="booking-btn" onclick="recordBooking()">+ New Booking</button>
    </div>
  </div>

  <div class="section-title">Recent Enquiries</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Subject</th>
          <th>Time</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="recent-tbody">
        <tr class="empty-row"><td colspan="5">No enquiries yet</td></tr>
      </tbody>
    </table>
  </div>

  <div class="section-title" style="margin-top:32px;">Recent Bookings</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="bookings-tbody">
        <tr class="empty-row"><td colspan="3">No bookings yet</td></tr>
      </tbody>
    </table>
  </div>
</main>

<footer>
  Last updated: <span id="last-updated">—</span> &nbsp;·&nbsp; Auto-refreshing every 10 seconds
</footer>

<script>
  function formatTime(isoString) {
    const d = new Date(isoString);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function badge(status) {
    const cls = status === 'replied' ? 'badge-replied' : 'badge-failed';
    return `<span class="badge ${cls}">${status}</span>`;
  }

  async function fetchStats() {
    try {
      const res = await fetch('/stats');
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();

      document.getElementById('total-enquiries').textContent = data.total_enquiries ?? 0;
      document.getElementById('replies-sent').textContent    = data.replies_sent   ?? 0;
      document.getElementById('bookings').textContent        = data.bookings        ?? 0;

      const tbody = document.getElementById('recent-tbody');
      const rows = data.recent ?? [];

      if (rows.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No enquiries yet</td></tr>';
      } else {
        tbody.innerHTML = rows.map(r => `
          <tr>
            <td>${escHtml(r.sender_name || '—')}</td>
            <td class="dim">${escHtml(r.sender_email || '—')}</td>
            <td>${escHtml(r.subject || '—')}</td>
            <td class="dim">${formatTime(r.timestamp)}</td>
            <td>${badge(r.status)}</td>
          </tr>
        `).join('');
      }

      const bookingsTbody = document.getElementById('bookings-tbody');
      const bookings = data.bookings_list ?? [];

      if (bookings.length === 0) {
        bookingsTbody.innerHTML = '<tr class="empty-row"><td colspan="3">No bookings yet</td></tr>';
      } else {
        bookingsTbody.innerHTML = bookings.map(b => `
          <tr>
            <td>${escHtml(b.name || '—')}</td>
            <td class="dim">${escHtml(b.email || '—')}</td>
            <td class="dim">${formatTime(b.timestamp)}</td>
          </tr>
        `).join('');
      }

      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
    } catch (err) {
      console.warn('Failed to fetch stats:', err);
    }
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function recordBooking() {
    const btn = document.getElementById('booking-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const res = await fetch('/stats/booking', { method: 'POST' });
      if (!res.ok) throw new Error(res.status);
      await fetchStats();
    } catch (err) {
      console.warn('Failed to record booking:', err);
    } finally {
      btn.disabled = false;
      btn.textContent = '+ New Booking';
    }
  }

  fetchStats();
  setInterval(fetchStats, 10000);
</script>

</body>
</html>
